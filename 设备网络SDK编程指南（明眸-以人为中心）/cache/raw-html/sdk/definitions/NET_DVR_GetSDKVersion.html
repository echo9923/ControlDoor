<h1>NET_DVR_GetSDKVersion</h1>
<p>获取SDK的版本信息。</p>

<PRE class=syntax><b>DWORD NET_DVR_GetSDKVersion(</b>
<b>);</b></PRE>

<h4>Return Values</h4>
<p>SDK版本信息，2个高字节表示主版本，2个低字节表示次版本。如0x00030000：表示版本为3.0。</p>
