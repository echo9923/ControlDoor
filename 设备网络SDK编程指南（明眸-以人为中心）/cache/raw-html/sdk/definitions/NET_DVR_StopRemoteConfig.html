<h1>NET_DVR_StopRemoteConfig</h1>
<p>关闭长连接配置接口所创建的句柄，释放资源。</p>

<PRE class=syntax><b>BOOL NET_DVR_StopRemoteConfig(</b>
<b>  LONG</b><i>    lHandle</i><b></b>
<b>);</b></PRE>

<h4>Parameters</h4>
<dl>
<dt><i>lHandle</i></dt>
<dd>[in] 句柄，NET_DVR_StartRemoteConfig的返回值</dd>
</dl>

<h4>Return Values</h4>
<p>TRUE表示成功，FALSE表示失败。接口返回失败请调用<b><a href="../definitions/NET_DVR_GetLastError.html">NET_DVR_GetLastError</a></b>获取错误码，通过错误码判断出错原因。</p>
